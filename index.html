<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>University GPA Tool</title>\n</head>\n<body>\n    <h1>Calculate Your GPA</h1>\n    <form id="gpaForm">\n        <label for="gradePoints">Grade Points:</label>\n        <input type="number" id="gradePoints" name="gradePoints" required>\n        <br>\n        <label for="creditHours">Credit Hours:</label>\n        <input type="number" id="creditHours" name="creditHours" required>\n        <br>\n        <button type="submit">Calculate GPA</button>\n    </form>\n    <div id="result"></div>\n    <script>\n        document.getElementById('gpaForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const gradePoints = parseFloat(document.getElementById('gradePoints').value);\n            const creditHours = parseFloat(document.getElementById('creditHours').value);\n            const gpa = gradePoints / creditHours;\n            document.getElementById('result').innerText = 'Your GPA is: ' + gpa.toFixed(2);\n        });\n    <\/script>\n</body>\n</html>
